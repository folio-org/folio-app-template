name: Release Application Version

run-name: >-
  ${{ inputs.dry_run == true && '[DRY RUN] ' || '' }}Release ${{ github.event.repository.name }}

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to release (defaults to branch HEAD)'
        required: false
        type: string
        default: ''
      base_branch:
        description: 'Release branch the commit belongs to (defaults to dispatch branch)'
        required: false
        type: string
        default: ''
      release_notes:
        description: 'Release notes body text'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Simulate without creating actual release'
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Create Release
    uses: folio-org/kitfox-github/.github/workflows/release-application-version-flow.yml@master
    with:
      repo_owner: ${{ github.repository_owner }}
      repo_name: ${{ github.event.repository.name }}
      commit_sha: ${{ inputs.commit_sha }}
      base_branch: ${{ inputs.base_branch != '' && inputs.base_branch || github.ref_name }}
      release_notes: ${{ inputs.release_notes }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit